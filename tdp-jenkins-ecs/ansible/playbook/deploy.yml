- hosts: jenkins
  become: true

  tasks:

    # -----------------------------
    # Esperar que cloud-init termine
    # -----------------------------
    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      changed_when: false

    # -----------------------------
    # Sistema base
    # -----------------------------
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    # -----------------------------
    # Limpiar instalaciones previas de Docker
    # -----------------------------
    - name: Remove old Docker packages if exist
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - containerd.io
          - runc
        state: absent
        purge: yes
      ignore_errors: yes

    # -----------------------------
    # Docker Official Repo
    # -----------------------------
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository (dynamic codename)
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Update apt cache after Docker repo
      apt:
        update_cache: yes

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # -----------------------------
    # Jenkins Setup
    # -----------------------------
    - name: Create Jenkins directory
      file:
        path: /opt/jenkins
        state: directory
        mode: '0755'

    - name: Copy docker compose
      copy:
        src: files/docker-compose.yml
        dest: /opt/jenkins/docker-compose.yml

    - name: Copy JCasC config
      copy:
        src: files/casc.yaml
        dest: /opt/jenkins/casc.yaml

    - name: Template env file
      template:
        src: templates/jenkins.env.j2
        dest: /opt/jenkins/jenkins.env

    - name: Start Jenkins
      shell: docker compose up -d
      args:
        chdir: /opt/jenkins