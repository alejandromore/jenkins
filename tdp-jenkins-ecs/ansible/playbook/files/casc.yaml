jenkins:
  systemMessage: "Jenkins Docker Simple Setup"
  numExecutors: 0

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADMIN_ID}
          password: ${JENKINS_ADMIN_PASSWORD}

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  clouds:
    - docker:
        name: "docker"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"

        templates:
          - labelString: "docker-agent"
            name: "docker-agent"
            mode: EXCLUSIVE
            pullStrategy: PULL_ALWAYS

            retentionStrategy:
              idleMinutes: 5

            remoteFs: "/home/jenkins"

            connector:
              attach:
                user: "jenkins"

            dockerTemplateBase:
              image: "swr.la-south-2.myhuaweicloud.com/devops/agent-huawei:1.0"
              tty: true
              mounts:
                - type: bind
                  source: /opt/jenkins/workspaces
                  target: /home/jenkins/workspace

unclassified:
  location:
    url: "http://jenkins:8080/"
    adminAddress: "admin@localhost"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: github-creds
              scope: GLOBAL
              username: ${GITHUB_USER}
              password: ${GITHUB_TOKEN}
              description: GitHub credentials
          - string:
              id: hwc-access-key
              scope: GLOBAL
              secret: ${HWC_ACCESS_KEY}
              description: Huawei Cloud Access Key
          - string:
              id: hwc-secret-key
              scope: GLOBAL
              secret: ${HWC_SECRET_KEY}
              description: Huawei Cloud Secret Key
          - file:
              id: cce-app-kubeconfig
              scope: GLOBAL
              fileName: kubeconfig
              secretBytes: ""
              description: CCE Kubeconfig file for App
          - usernamePassword:
              id: swr-jenkins
              scope: GLOBAL
              username: ""
              password: ""
              description: SWR Login Jenkins
          - file:
              id: sops-gpg-key
              scope: GLOBAL
              fileName: sops-gpg-key
              secretBytes: ""
              description: Key for SOPS
              