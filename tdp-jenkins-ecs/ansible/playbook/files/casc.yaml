jenkins:
  systemMessage: "Jenkins Docker Setup with SWR"
  numExecutors: 0

  securityRealm: none
  authorizationStrategy: unsecured

  clouds:
    - docker:
        name: "docker"

        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"

        templates:
          - labelString: "agent-terraform"
            name: "agent-terraform"
            mode: EXCLUSIVE
            pullStrategy: PULL_ALWAYS
            retentionStrategy:
              idleMinutes: 5
            remoteFs: "/home/jenkins"
            connector:
              attach:
                user: "jenkins"
            dockerTemplateBase:
              image: "swr.la-south-2.myhuaweicloud.com/cce-jenkins-integration-organization/jenkins-agent-terraform:1.0"
              pullCredentialsId: "swr-jenkins"
              tty: true
              mounts:
                - "type=bind,source=/opt/jenkins/workspaces,target=/home/jenkins/workspace"

          - labelString: "agent-huawei"
            name: "agent-huawei"
            mode: EXCLUSIVE
            pullStrategy: PULL_ALWAYS
            retentionStrategy:
              idleMinutes: 5
            remoteFs: "/home/jenkins"
            connector:
              attach:
                user: "jenkins"
            dockerTemplateBase:
              image: "swr.la-south-2.myhuaweicloud.com/cce-jenkins-integration-organization/jenkins-agent-terraform:1.0"
              pullCredentialsId: "swr-jenkins"
              tty: true
              mounts:
                - "type=bind,source=/opt/jenkins/workspaces,target=/home/jenkins/workspace"

          - labelString: "genesisBackJdk21"
            name: "genesisBackJdk21"
            mode: EXCLUSIVE
            pullStrategy: PULL_ALWAYS
            retentionStrategy:
              idleMinutes: 5
            remoteFs: "/home/jenkins"
            connector:
              attach:
                user: "jenkins"
            dockerTemplateBase:
              image: "swr.la-south-2.myhuaweicloud.com/cce-jenkins-integration-organization/jenkins-agent-huawei:1.0"
              pullCredentialsId: "swr-jenkins"
              tty: true
              mounts:
                - "type=bind,source=/opt/jenkins/workspaces,target=/home/jenkins/workspace"

unclassified:
  location:
    url: "http://jenkins:8080/"
    adminAddress: "admin@localhost"

credentials:
  system:
    domainCredentials:
      - credentials:

          - usernamePassword:
              id: github-creds
              scope: GLOBAL
              username: ${GITHUB_USER}
              password: ${GITHUB_TOKEN}
              description: GitHub credentials

          - usernamePassword:
              id: telefonica-bitbucket
              scope: GLOBAL
              username: ""
              password: ""
              description: Telefonica Bit Bucket Credentials

          - usernamePassword:
              id: swr-jenkins
              scope: GLOBAL
              username: ${SWR_USER}
              password: ${SWR_PASSWORD}
              description: SWR Login Jenkins

          - string:
              id: hwc-access-key
              scope: GLOBAL
              secret: ${HWC_ACCESS_KEY}
              description: Huawei Cloud Access Key

          - string:
              id: hwc-secret-key
              scope: GLOBAL
              secret: ${HWC_SECRET_KEY}
              description: Huawei Cloud Secret Key

          - file:
              id: cce-app-kubeconfig
              scope: GLOBAL
              fileName: kubeconfig
              secretBytes: ""
              description: CCE Kubeconfig file for App

          - file:
              id: sops-gpg-key
              scope: GLOBAL
              fileName: sops-gpg-key
              secretBytes: ""
              description: Key for SOPS