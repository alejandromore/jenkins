services:
  jenkins:
    image: swr.la-south-2.myhuaweicloud.com/cce-jenkins-integration-organization/jenkins-controller:1.0
    container_name: jenkins
    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - jenkins.env
      - secrets.env

    volumes:
      - jenkins_home:/var/jenkins_home
      - ./casc.yaml:/var/jenkins_home/casc.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/jenkins/workspaces:/opt/jenkins/workspaces

    networks:
      - jenkinsnet

    user: root

volumes:
  jenkins_home:

networks:
  jenkinsnet:
    driver: bridge