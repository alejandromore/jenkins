version: '3.8'

services:
  jenkins:
    build: .
    container_name: jenkins
    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - jenkins.env

    volumes:
      - jenkins_home:/var/jenkins_home
      - ./casc.yaml:/var/jenkins_home/casc.yaml
      - /var/run/docker.sock:/var/run/docker.sock

    user: root

volumes:
  jenkins_home:

services:
  jenkins:
    networks:
      - jenkinsnet

networks:
  jenkinsnet:
    driver: bridge