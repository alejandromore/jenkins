apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-dew-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-dew-test
  template:
    metadata:
      labels:
        app: pod-dew-test
    spec:
      # 1️⃣ ServiceAccount que coincide con el mapping IAM
      serviceAccountName: workload-identity-sa

      containers:
      - name: pod-dew-test
        image: ubuntu:latest
        command: ["/bin/bash", "-c", "/opt/scripts/setup-hcloud.sh && tail -f /dev/null"]

        volumeMounts:
        # Script desde ConfigMap
        - name: script-volume
          mountPath: /opt/scripts

        # OIDC Token proyectado
        - name: oidc-token
          mountPath: /var/run/secrets/tokens
          readOnly: true

      volumes:
      # ConfigMap con script
      - name: script-volume
        configMap:
          name: cm-hcloud-setup
          defaultMode: 0755

      # 🔐 Token OIDC proyectado
      - name: oidc-token
        projected:
          sources:
          - serviceAccountToken:
              audience: huawei-cce     # ← debe coincidir con client_id en IAM
              expirationSeconds: 7200
              path: oidc-token