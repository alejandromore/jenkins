apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-test-setup
data:
  setup-test.sh: |
    #!/bin/bash
    set -e
    export DEBIAN_FRONTEND=noninteractive

    echo "Instalando dependencias..."
    apt-get update && apt-get install -y curl jq ca-certificates

    echo "Leyendo OIDC token del ServiceAccount..."
    OIDC_TOKEN=$(cat /var/run/secrets/tokens/oidc-token)

    if [ -z "$OIDC_TOKEN" ]; then
      echo "❌ No se encontró OIDC token"
      exit 1
    fi

    echo "OIDC token leído correctamente"
    echo "Intercambiando token contra IAM..."

    RESPONSE=$(curl -s -i \
      -X POST https://iam.la-south-2.myhuaweicloud.com/v3.0/OS-AUTH/id-token/tokens \
      -H "Content-Type: application/json" \
      -H "X-Idp-Id: cce-workload-oidc" \
      -d "{
        \"auth\": {
          \"id_token\": {\"id\": \"${OIDC_TOKEN}\"},
          \"scope\": {
            \"project\": {
              \"name\": \"la-south-2\"
            }
          }
        }
      }")

    IAM_TOKEN=$(echo "$RESPONSE" | grep -Fi X-Subject-Token | awk '{print $2}' | tr -d '\r')

    if [ -z "$IAM_TOKEN" ]; then
      echo "❌ Error obteniendo IAM token"
      echo "$RESPONSE"
      exit 1
    fi

    echo "✅ IAM token obtenido correctamente"
    echo "Workload Identity está funcionando 🎉"

    tail -f /dev/null