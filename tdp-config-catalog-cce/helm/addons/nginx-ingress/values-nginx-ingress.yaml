controller:
  replicaCount: 2

  config:
    enable-modsecurity: "true"
    enable-owasp-modsecurity-crs: "true"
    modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyAccess On

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  service:
    type: LoadBalancer
    annotations:
      kubernetes.io/elb.class: union
      #kubernetes.io/elb.id: ""
      kubernetes.io/elb.id: {{ ELB_ID }}

  admissionWebhooks:
    enabled: false

  metrics:
    enabled: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

defaultBackend:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi