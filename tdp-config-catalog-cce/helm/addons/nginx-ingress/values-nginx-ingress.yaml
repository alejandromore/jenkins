controller:
  replicaCount: 2

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  service:
    type: LoadBalancer
    annotations:
      kubernetes.io/elb.class: union
      kubernetes.io/elb.id: ""

  admissionWebhooks:
    enabled: false
    #patch:
    #  enabled: true
    #createSecretJob:
    #  enabled: true

  metrics:
    enabled: true

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

defaultBackend:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi