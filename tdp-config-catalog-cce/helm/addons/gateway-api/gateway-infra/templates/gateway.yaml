apiVersion: gateway.networking.k8s.io/v1
kind: Gateway

metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}

  annotations:
    kubernetes.io/elb.id: {{ .Values.elb.id }}

spec:
  gatewayClassName: {{ .Values.gateway.className }}

  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.port }}

      allowedRoutes:
        namespaces:
          from: All