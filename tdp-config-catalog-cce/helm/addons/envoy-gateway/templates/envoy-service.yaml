apiVersion: v1
kind: Service
metadata:
  name: envoy-gateway
  namespace: {{ .Release.Namespace }}

  annotations:
    kubernetes.io/elb.id: {{ .Values.elb.id | quote }}

spec:
  type: LoadBalancer

  selector:
    app.kubernetes.io/name: envoy-gateway

  ports:
    - name: http
      port: 80
      targetPort: 10080