{{- if and .Values.demoClient.enabled (eq .Values.demoClient.exposure.type "gateway") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-client
  labels:
    app: demo-client

spec:
  parentRefs:
    - name: cluster-gateway
      namespace: envoy-gateway-system
      
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: demo-client
          port: {{ .Values.demoClient.port }}
{{- end }}